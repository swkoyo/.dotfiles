# ~/.config/hypr/hyprpaper.conf
# Optional: disable splash / other stuff if you want
splash = false
# ipc = off   # if you don't need dynamic changes via socket, saves a tiny bit of battery/CPU

wallpaper {
    monitor =          # empty = apply to all monitors (fallback)
    path = ~/Pictures/wallpapers/monastery_6000x4000.jpg
    fit_mode = cover   # or contain, fill, tile — cover is usually best for most images
}

# If you want per-monitor (get names with `hyprctl monitors`)
# wallpaper {
#     monitor = eDP-1    # or HDMI-A-1, DP-1, etc.
#     path = ~/Pictures/wallpapers/kanji-5120x1440.jpg
#     fit_mode = cover
# }

# Optional: fallback for any unconfigured monitors
# wallpaper {
#     monitor = 
#     path = ~/Pictures/wallpapers/kanji-5120x1440.jpg
#     fit_mode = cover
# }
